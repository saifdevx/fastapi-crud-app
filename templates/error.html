{% extends "layout.html" %}
{% block content %}
  <article class="content-section py-3 px-4 mb-4">
    <div class="text-center py-4">
      <h1 style="font-size: 5rem; color: var(--accent-red); font-family: 'Montserrat', sans-serif; font-weight: 700;">
        {{ status_code }}
      </h1>
      <h2 class="article-title mb-3">
        {% if status_code == 404 %}
          Page Not Found
        {% elif status_code == 403 %}
          Access Denied
        {% elif status_code == 500 %}
          Server Error
        {% else %}
          Something Went Wrong
        {% endif %}
      </h2>
      <p class="article-content mb-4">{{ message }}</p>
      <a href="{{ url_for('home') }}" class="btn btn-outline-danger">
        Go Back Home
      </a>
    </div>
  </article>
{% endblock content %}
